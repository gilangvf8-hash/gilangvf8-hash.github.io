name: IndexNow Sitemap Submission

on:
  push:
    branches:
      - main

jobs:
  submit-to-indexnow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Submit sitemap URLs to IndexNow
        env:
          SITEMAP: https://gilangvf8-hash.github.io/sitemap.xml
          HOST: gilangvf8-hash.github.io
          API_KEY: 77a3acba077848458350759957d374a1
        run: |
          node <<'EOF'
          const sitemap = process.env.SITEMAP;
          const host = process.env.HOST;
          const key = process.env.API_KEY;

          async function main() {
            const res = await fetch(sitemap);
            const xml = await res.text();

            const urls = [...xml.matchAll(/<loc>(.*?)<\/loc>/g)].map(m => m[1]);

            if (urls.length === 0) {
              console.log("Tidak ada URL ditemukan di sitemap.");
              return;
            }

            const payload = {
              host,
              key,
              keyLocation: `https://${host}/${key}.txt`,
              urlList: urls
            };

            const response = await fetch("https://api.indexnow.org/IndexNow", {
              method: "POST",
              headers: {
                "Content-Type": "application/json; charset=utf-8"
              },
              body: JSON.stringify(payload)
            });

            console.log("Status:", response.status);
            console.log(await response.text());
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF
